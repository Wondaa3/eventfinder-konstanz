<body>
<header>

        <a href="suche.html">Suche</a>
        <a href="login.html">Login</a>
    </nav>
</header>

<main>

    <section>
        <div class="suche">
            <h2>Events in deiner Stadt</h2>
            <p>Finde Konzerte, Partys, Uni-Events und mehr – überall in Deutschland.</p>

            <form action="suche.html" method="get">
                <label for="suchbegriff">Was suchst du?</label>
                <input type="text" id="suchbegriff" name="category" placeholder="z.B. Konzert, Party...">

                <label for="stadt">Stadt</label>
                <input type="text" id="stadt" name="city" placeholder="z.B. Berlin, Konstanz...">

                <button type="submit">Events finden</button>
            </form>
        </div>
        </section>
</main>
